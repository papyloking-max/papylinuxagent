name: papylinuxagent
description: "PapylinuxAgent - AI-native Linux & Android Operating Environment (Production)"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  dio: ^5.7.0
  web_socket_channel: ^3.0.1
  flutter_riverpod: ^2.5.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2
  flutter_markdown: ^0.7.3+1
  xterm: ^4.0.0
  file_picker: ^8.1.2
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
